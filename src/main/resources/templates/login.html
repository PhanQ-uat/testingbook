<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="logo">
                <h1 id="siteNameLogo">testerBook</h1>
                <p class="text-muted" id="siteDescription">Learning Management System for Software Testing Students</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                
                <button type="submit" class="btn btn-primary w-100">Login</button>
                
                <div class="text-center mt-3">
                    <p>Don't have an account? <a href="/register">Register here</a></p>
                </div>
            </form>
            
            <!-- Success Message (Hidden by default) -->
            <div id="successMessage" class="alert alert-success mt-3" style="display: none;">
                <h5>Login Successful!</h5>
                <p>Welcome back! Redirecting to home page...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check if user is already logged in and redirect to home
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                // User is already logged in, redirect to home page
                window.location.href = '/';
                return;
            }
            
            // Load site settings
            loadSiteSettings();
        });
        
        async function loadSiteSettings() {
            try {
                const response = await fetch('/api/settings/all');
                if (response.ok) {
                    const settings = await response.json();
                    const siteName = settings.siteName || 'testerBook';
                    const siteDesc = settings.siteDescription || 'Learning Management System for Software Testing Students';
                    
                    document.getElementById('siteNameLogo').textContent = siteName;
                    document.getElementById('siteDescription').textContent = siteDesc;
                    document.title = 'Login - ' + siteName;
                }
            } catch (error) {
                console.error('Error loading site settings:', error);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    
                    // Show success message
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                    
                    // Redirect to home page after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = '/'; // Go to home page, not dashboard
                    }, 1500);
                } else {
                    alert('Login failed. Please check your credentials.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Login failed. Please try again.');
            }
        });
    </script>
</body>
</html>
