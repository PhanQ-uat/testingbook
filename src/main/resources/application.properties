# Server Configuration
server.port=8080

# Database Configuration (PostgreSQL for production, H2 for development)
# Uncomment PostgreSQL for production use
#spring.datasource.url=jdbc:postgresql://localhost:5432/testerbook
#spring.datasource.username=postgres
#spring.datasource.password=password
#spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Database (for development)
spring.datasource.url=jdbc:h2:mem:testerbook
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# Thymeleaf Configuration
spring.thymeleaf.cache=false
